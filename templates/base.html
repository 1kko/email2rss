<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}email2rss{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='reader.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav__left">
      <a href="/" class="nav-home" aria-label="email2rss home">email2rss</a>
      <a href="/article" class="nav-link">All Articles</a>
    </div>
    <form class="nav-search" action="/search" method="get">
      <input type="search" name="q" placeholder="Search..." value="{{ search_q or '' }}" required>
    </form>
  </nav>
  {% block body %}{% endblock %}
</body>
</html>
