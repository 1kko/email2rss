<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{{ page_title }}{% endblock %}</title>
</head>
<body>
{% if filter_mode %}<!-- filter: {{ filter_mode }} -->{% endif %}
<article>
  {% if specific_sender %}
    <header>
      <h1>Articles from {{ specific_sender }}</h1>
    </header>
  {% else %}
    <header>
      <h1>All Articles</h1>
    </header>
  {% endif %}
  <ul class="article-items">
    {% for article in articles %}
      <li{% if not article.is_read %} class="unread"{% endif %}>
        <a href="/article/{{ article.feed_name }}/{{ article.guid }}" class="article-title">{{ article.subject }}</a>
        <span class="meta">From: {{ article.sender }} | Date: {{ article.date or '' }}</span>
      </li>
    {% endfor %}
  </ul>
</article>
</body>
</html>
